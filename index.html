<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ซันเดย์สุดฉลาด 0.1 (Continuous Memory)</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #000000;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px;
    }
    
    .cyber-container {
      width: 100%;
      max-width: 600px;
      height: 90vh;
      background: #0a0a0a;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(255, 255, 255, 0.05);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      border: 1px solid #222222;
    }
    
    .cyber-header {
      background: #111111;
      padding: 15px 20px;
      border-bottom: 1px solid #222222;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 15px;
    }
    
    .logo-section {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .cyber-logo {
      font-size: 1.5em;
      filter: grayscale(100%);
    }
    
    .title {
      font-size: 1.2em;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.5px;
    }
    
    .subtitle {
      font-size: 0.75em;
      color: #666666;
      margin-top: 2px;
    }

    /* 🛠️ เพิ่มสไตล์ส่วนควบคุมปุ่มด้านบน */
    .header-controls {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #ffffff;
      color: #000000;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .status-light {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #000000;
      animation: pulse 1.5s infinite;
    }

    /* 🔴 ปุ่ม Reset ดีไซน์เรียบหรูสไตล์ Cyberpunk */
    .reset-btn {
      background: transparent;
      border: 1px solid #333333;
      color: #888888;
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: bold;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.2s ease;
    }

    .reset-btn:hover {
      border-color: #ff3333;
      color: #ff3333;
      background: rgba(255, 51, 51, 0.05);
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }
    
    .messages-container::-webkit-scrollbar {
      width: 4px;
    }
    
    .messages-container::-webkit-scrollbar-track {
      background: #000000;
    }
    
    .messages-container::-webkit-scrollbar-thumb {
      background: #222222;
    }
    
    .message {
      margin-bottom: 18px;
      animation: slideIn 0.2s ease-out;
      display: flex;
      flex-direction: column;
    }
    
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .user-message {
      align-items: flex-end;
    }
    
    .user-message .message-content {
      background: #ffffff;
      color: #000000;
      padding: 11px 15px;
      border-radius: 6px 6px 0px 6px;
      max-width: 85%;
      word-wrap: break-word;
      white-space: pre-wrap;
      font-size: 14.5px;
      line-height: 1.5;
      font-weight: 500;
    }
    
    .ai-message {
      align-items: flex-start;
    }
    
    .ai-message .message-content {
      background: #141414;
      color: #eaeaea;
      padding: 11px 15px;
      border-radius: 6px 6px 6px 0px;
      max-width: 85%;
      word-wrap: break-word;
      white-space: pre-wrap;
      font-size: 14.5px;
      line-height: 1.5;
      border: 1px solid #222222;
    }
    
    .message-time {
      font-size: 0.7em;
      color: #555555;
      margin-top: 4px;
      padding: 0 2px;
    }
    
    .input-area {
      padding: 15px;
      background: #111111;
      border-top: 1px solid #222222;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    
    #user-input {
      flex: 1;
      background: #000000;
      border: 1px solid #222222;
      border-radius: 4px;
      padding: 12px;
      color: #ffffff;
      font-family: inherit;
      font-size: 14.5px;
      resize: none;
      outline: none;
      transition: border-color 0.2s;
    }
    
    #user-input:focus {
      border-color: #ffffff;
    }
    
    #user-input:disabled {
      background: #111111;
      color: #444444;
      cursor: not-allowed;
    }
    
    .send-btn {
      background: #ffffff;
      border: none;
      border-radius: 4px;
      padding: 12px 20px;
      color: #000000;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
      font-size: 14.5px;
      height: 44px;
    }
    
    .send-btn:hover {
      background: #cccccc;
    }
    
    .send-btn:disabled {
      background: #222222;
      color: #555555;
      cursor: not-allowed;
    }
    
    .typing-indicator {
      display: none;
      padding: 8px 20px;
      color: #666666;
      font-size: 13px;
      letter-spacing: 0.5px;
    }
    
    .typing-indicator.active {
      display: block;
    }
    
    .welcome-message {
      text-align: center;
      padding: 40px 20px;
      color: #555555;
      font-size: 13.5px;
      line-height: 1.6;
      letter-spacing: 0.3px;
    }
  </style>
</head>

<body>
  <div class="cyber-container">
    <div class="cyber-header">
      <div class="logo-section">
        <div class="cyber-logo">😈️</div>
        <div>
          <div class="title">ซันเดย์สุดฉลาด 0.1</div>
          <div class="subtitle">😈 (Speed 0.0.1)</div>
        </div>
      </div>
      <div class="header-controls">
        <!-- 🔴 เพิ่มปุ่ม Reset ตรงนี้ -->
        <button class="reset-btn" id="reset-btn">Reset</button>
        <div class="status-badge">
          <div class="status-light"></div>
          <span>Online</span>
        </div>
      </div>
    </div>
    
    <div class="chat-area">
      <div class="messages-container" id="messages-container">
        <div class="welcome-message">
          <div><strong>by tbd</strong></div>
          <div>💬 ระบบพร้อมใช้งาน</div>
        </div>
      </div>
      
      <div class="typing-indicator" id="typing-indicator">
        <span>กำลังคิดคำตอบ...</span>
      </div>
      
      <div class="input-area">
        <textarea id="user-input" placeholder="พิมพ์ข้อความที่นี่... (กด Enter เพื่อส่ง)" rows="1"></textarea>
        <button class="send-btn" id="send-btn">ส่ง</button>
      </div>
    </div>
  </div>
  
  <script>
    const AI_PERSONA = `คุณคือ "ซันเดย์สุดหล่อ" ต้องมีคับตามท้าย เท่านั้น ห้ามมีค่ะเด็ดขาดห้ามเด็ดขาดไม่ว่าจะยังไงก็ตามเเละคุณต้องเป็นคนที่ฉลาดมากๆเรียนเก่งเเละให้คำเเนะนำได้ดีมากๆเมื่อเเก้ปัญหาต่างๆคุณจะตอบตามหลังเมื่อแก้ปัญหาเสร็จว่า เเน่นอนหมื่นล้านเปอร์เซ็น`;

    class CyberAI {
      constructor(apiKey) {
        this.apiKey = apiKey;
        this.apiUrl = 'https://api.groq.com/openai/v1/chat/completions';
      }
      
      // 🔄 ปรับมารับค่าโครงสร้างประวัติการคุยทั้งหมด (messagesHistory) แทนข้อความเดี่ยว
      async sendMessage(messagesHistory) {
        try {
          const response = await fetch(this.apiUrl, {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${this.apiKey}`,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              model: 'llama-3.1-8b-instant', // โมเดลรุ่นล่าสุดของค่าย Groq
              messages: messagesHistory
            })
          });

          if (!response.ok) {
            if (response.status === 429) {
              throw new Error("ยิงคำขอถี่เกินไปชั่วคราว กรุณาเว้นระยะแปบนึงนะ");
            }
            throw new Error(`API Error ${response.status}: ${response.statusText}`);
          }
          
          const data = await response.json();
          return data;
        } catch (error) {
          console.error('API Error:', error);
          return {
            error: true,
            message: `⚠️ เชื่อมต่อล้มเหลว: ${error.message}`
          };
        }
      }
    }
    
    const MY_API_KEY = "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";
    const cyberAI = new CyberAI(MY_API_KEY);
    
    const messagesContainer = document.getElementById('messages-container');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const resetBtn = document.getElementById('reset-btn');
    const typingIndicator = document.getElementById('typing-indicator');
    
    let isSending = false;
    let welcomeRemoved = false;
    
    // 📦 อาร์เรย์หลักสำหรับจดจำประวัติบทสนทนาแบบ Real-time
    let chatHistory = [
      { role: 'system', content: AI_PERSONA }
    ];
    
    function addMessageAnimated(text, isUser, timestamp = new Date()) {
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${isUser ? 'user-message' : 'ai-message'}`;
      
      const timeStr = timestamp.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      
      const innerDiv = document.createElement('div');
      const contentDiv = document.createElement('div');
      contentDiv.className = 'message-content';
      
      const timeDiv = document.createElement('div');
      timeDiv.className = 'message-time';
      timeDiv.innerText = `${isUser ? 'คุณ' : 'ซันเดย์สุดหล่อ'} • ${timeStr}`;
      
      innerDiv.appendChild(contentDiv);
      innerDiv.appendChild(timeDiv);
      messageDiv.appendChild(innerDiv);
      messagesContainer.appendChild(messageDiv);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;

      if (isUser) {
        contentDiv.textContent = text;
      } else {
        let i = 0;
        isSending = true; 
        sendBtn.disabled = true;
        userInput.disabled = true;
        
        const timer = setInterval(() => {
          if (i < text.length) {
            contentDiv.textContent += text.charAt(i);
            i++;
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
          } else {
            clearInterval(timer);
            isSending = false;
            sendBtn.disabled = false;
            userInput.disabled = false;
            userInput.focus();
          }
        }, 5);
      }
    }
    
    function extractAIResponse(data) {
      if (data.error) return data.message;
      if (data.choices && data.choices[0]?.message?.content) {
        return data.choices[0].message.content;
      }
      return "🤖 ได้รับข้อมูลสำเร็จแต่ระบบไม่สามารถถอดรหัสข้อความได้";
    }
    
    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text || isSending) return;
      
      if (!welcomeRemoved) {
        const welcomeDiv = document.querySelector('.welcome-message');
        if (welcomeDiv) welcomeDiv.remove();
        welcomeRemoved = true;
      }
      
      userInput.value = '';
      userInput.style.height = 'auto';
      
      addMessageAnimated(text, true);
      
      // 1. บันทึกคำถามล่าสุดของผู้ใช้ลงในความจำของระบบก่อน
      chatHistory.push({ role: 'user', content: text });
      
      isSending = true;
      sendBtn.disabled = true;
      userInput.disabled = true;
      typingIndicator.classList.add('active');
      
      try {
        // 2. ส่งประวัติการคุยทั้งหมดไปที่ Groq เพื่อให้บอทไม่ลืมบริบทเก่า
        const response = await cyberAI.sendMessage(chatHistory);
        const aiText = extractAIResponse(response);
        
        typingIndicator.classList.remove('active');
        addMessageAnimated(aiText, false);
        
        // 3. ถ้าคุยสำเร็จ ให้บันทึกคำตอบของบอทลงในระบบความจำ เพื่อการคุยต่อครั้งหน้า
        if (!response.error) {
          chatHistory.push({ role: 'assistant', content: aiText });
        }
      } catch (error) {
        typingIndicator.classList.remove('active');
        addMessageAnimated(`⚠️ ข้อผิดพลาด: ${error.message}`, false);
        isSending = false;
        sendBtn.disabled = false;
        userInput.disabled = false;
      }
    }

    // 🔴 ฟังก์ชันเคลียร์ความทรงจำเมื่อกดปุ่ม Reset
    resetBtn.addEventListener('click', function() {
      if (isSending) return; // ล็อคไม่ให้กดตอนบอทกำลังพิมพ์ตอบ

      // ล้างข้อมูลความจำเดิม กลับไปเริ่มต้นระบบบทบาทดั้งเดิม
      chatHistory = [
        { role: 'system', content: AI_PERSONA }
      ];

      // รีเซ็ตหน้าจอแชทใหม่หมด
      messagesContainer.innerHTML = `
        <div class="welcome-message">
          <div><strong>by tbd</strong></div>
          <div>🗑️ ล้างความจำเรียบร้อย! เริ่มต้นบทสนทนาใหม่กับซันเดย์สุดหล่อได้เลย</div>
        </div>
      `;
      welcomeRemoved = false;
      userInput.value = '';
      userInput.focus();
    });
    
    function autoResizeTextarea() {
      userInput.style.height = 'auto';
      userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
    }
    
    sendBtn.addEventListener('click', function(e) {
      e.preventDefault();
      sendMessage();
    });
    
    userInput.addEventListener('keypress', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
    
    userInput.addEventListener('input', autoResizeTextarea);
    userInput.focus();
  </script>
</body>

</html>
