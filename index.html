<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>chat tbd 0.2 </title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #000000;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px;
    }
    
    .cyber-container {
      width: 100%;
      max-width: 600px;
      height: 90vh;
      background: #0a0a0a;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(255, 255, 255, 0.05);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      border: 1px solid #222222;
    }
    
    .cyber-header {
      background: #111111;
      padding: 15px 20px;
      border-bottom: 1px solid #222222;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 15px;
    }
    
    .logo-section {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .cyber-logo {
      font-size: 1.5em;
      filter: grayscale(100%);
    }
    
    .title {
      font-size: 1.2em;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.5px;
    }
    
    .subtitle {
      font-size: 0.75em;
      color: #666666;
      margin-top: 2px;
    }
    
    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #ffffff;
      color: #000000;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .status-light {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #000000;
      animation: pulse 1.5s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }
    
    .messages-container::-webkit-scrollbar {
      width: 4px;
    }
    
    .messages-container::-webkit-scrollbar-track {
      background: #000000;
    }
    
    .messages-container::-webkit-scrollbar-thumb {
      background: #222222;
    }
    
    .message {
      margin-bottom: 18px;
      animation: slideIn 0.2s ease-out;
      display: flex;
      flex-direction: column;
    }
    
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .user-message {
      align-items: flex-end;
    }
    
    .user-message .message-content {
      background: #ffffff;
      color: #000000;
      padding: 11px 15px;
      border-radius: 6px 6px 0px 6px;
      max-width: 85%;
      word-wrap: break-word;
      white-space: pre-wrap;
      font-size: 14.5px;
      line-height: 1.5;
      font-weight: 500;
    }
    
    .ai-message {
      align-items: flex-start;
    }
    
    .ai-message .message-content {
      background: #141414;
      color: #eaeaea;
      padding: 11px 15px;
      border-radius: 6px 6px 6px 0px;
      max-width: 85%;
      word-wrap: break-word;
      white-space: pre-wrap;
      font-size: 14.5px;
      line-height: 1.5;
      border: 1px solid #222222;
    }
    
    .message-time {
      font-size: 0.7em;
      color: #555555;
      margin-top: 4px;
      padding: 0 2px;
    }
    
    .input-area {
      padding: 15px;
      background: #111111;
      border-top: 1px solid #222222;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    
    #user-input {
      flex: 1;
      background: #000000;
      border: 1px solid #222222;
      border-radius: 4px;
      padding: 12px;
      color: #ffffff;
      font-family: inherit;
      font-size: 14.5px;
      resize: none;
      outline: none;
      transition: border-color 0.2s;
    }
    
    #user-input:focus {
      border-color: #ffffff;
    }
    
    .send-btn {
      background: #ffffff;
      border: none;
      border-radius: 4px;
      padding: 12px 20px;
      color: #000000;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
      font-size: 14.5px;
      height: 44px;
    }
    
    .send-btn:hover {
      background: #cccccc;
    }
    
    .send-btn:disabled {
      background: #222222;
      color: #555555;
      cursor: not-allowed;
    }
    
    .typing-indicator {
      display: none;
      padding: 8px 20px;
      color: #666666;
      font-size: 13px;
      letter-spacing: 0.5px;
    }
    
    .typing-indicator.active {
      display: block;
    }
    
    .welcome-message {
      text-align: center;
      padding: 40px 20px;
      color: #555555;
      font-size: 13.5px;
      line-height: 1.6;
      letter-spacing: 0.3px;
    }
  </style>
</head>

<body>
  <div class="cyber-container">
    <div class="cyber-header">
      <div class="logo-section">
        <div class="cyber-logo">◼️</div>
        <div>
          <div class="title">chat tbd 0.2</div>
          <div class="subtitle">😈</div>
        </div>
      </div>
      <div class="status-badge">
        <div class="status-light"></div>
        <span>Online</span>
      </div>
    </div>
    
    <div class="chat-area">
      <div class="messages-container" id="messages-container">
        <div class="welcome-message">
          <div><strong>by tbd</strong></div>
          <div>💬</div>
        </div>
      </div>
      
      <div class="typing-indicator" id="typing-indicator">
        <span>กำลังคิด...</span>
      </div>
      
      <div class="input-area">
        <textarea id="user-input" placeholder="พิมพ์ข้อความที่นี่... (กด Enter เพื่อส่ง)" rows="1"></textarea>
        <button class="send-btn" id="send-btn">ส่ง</button>
      </div>
    </div>
  </div>
  
  <script>
    class CyberAI {
      constructor(apiUrl) {
        this.apiUrl = apiUrl;
      }
      
      async sendMessage(userText) {
        try {
          const url = `${this.apiUrl}?text=${encodeURIComponent(userText)}`;
          console.log('Calling API:', url);
          
          const response = await fetch(url);
          if (!response.ok) {
            throw new Error(`API Error ${response.status}: ${response.statusText}`);
          }
          
          const data = await response.json();
          console.log('Raw API Response:', data);
          return data;
        } catch (error) {
          console.error('API Error:', error);
          return {
            error: true,
            message: `⚠️ Connection Fail: ${error.message}\nไม่สามารถติดต่อเซิร์ฟเวอร์ได้ กรุณาลองใหม่อีกครั้ง`
          };
        }
      }
    }
    
    const cyberAI = new CyberAI('https://apis.davidcyril.name.ng/ai/felo');
    
    const messagesContainer = document.getElementById('messages-container');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const typingIndicator = document.getElementById('typing-indicator');
    
    let isSending = false;
    let welcomeRemoved = false;
    
    // ฟังก์ชันสร้างกล่องข้อความและแสดงผลแบบ Streaming (พิมพ์ทีละตัวอักษร)
    function addMessageAnimated(text, isUser, timestamp = new Date()) {
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${isUser ? 'user-message' : 'ai-message'}`;
      
      const timeStr = timestamp.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      
      const innerDiv = document.createElement('div');
      const contentDiv = document.createElement('div');
      contentDiv.className = 'message-content';
      
      const timeDiv = document.createElement('div');
      timeDiv.className = 'message-time';
      timeDiv.innerText = `${isUser ? 'คุณ' : 'chat tbd'} • ${timeStr}`;
      
      innerDiv.appendChild(contentDiv);
      innerDiv.appendChild(timeDiv);
      messageDiv.appendChild(innerDiv);
      messagesContainer.appendChild(messageDiv);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;

      if (isUser) {
        // ข้อความฝั่งผู้ใช้ ให้แสดงเต็มทันที
        contentDiv.textContent = text;
      } else {
        // ข้อความฝั่ง AI ใช้เอฟเฟกต์พิมพ์ทีละตัวอักษรแบบ ChatGPT
        let i = 0;
        isSending = true; 
        sendBtn.disabled = true;
        
        const timer = setInterval(() => {
          if (i < text.length) {
            contentDiv.textContent += text.charAt(i);
            i++;
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
          } else {
            clearInterval(timer);
            // พิมพ์เสร็จแล้ว คลายล็อกปุ่มส่ง
            isSending = false;
            sendBtn.disabled = false;
            userInput.focus();
          }
        }, 20); // ความเร็วในการพ่นตัวอักษร (20ms ต่อ 1 ตัวอักษร) วิ่งเนียนตามากครับ
      }
    }
    
    function extractAIResponse(data) {
      if (data.error) return data.message;
      if (typeof data === 'string') return data;
      
      const possibleFields = [
        'response', 'text', 'message', 'content', 'reply', 'answer',
        'generated_text', 'output', 'result', 'data', 'candidates', 'choices'
      ];
      
      for (const field of possibleFields) {
        if (data[field]) {
          if (field === 'candidates' && Array.isArray(data[field]) && data[field][0]) {
            const candidate = data[field][0];
            if (candidate.content) return candidate.content;
            if (candidate.text) return candidate.text;
            return JSON.stringify(candidate);
          }
          if (field === 'choices' && Array.isArray(data[field]) && data[field][0]) {
            const choice = data[field][0];
            if (choice.message?.content) return choice.message.content;
            if (choice.text) return choice.text;
            return JSON.stringify(choice);
          }
          if (typeof data[field] === 'string') return data[field];
          if (typeof data[field] === 'object') return JSON.stringify(data[field]);
        }
      }
      return "🤖 ได้รับข้อมูลสำเร็จ";
    }
    
    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text || isSending) return;
      
      if (!welcomeRemoved) {
        const welcomeDiv = document.querySelector('.welcome-message');
        if (welcomeDiv) welcomeDiv.remove();
        welcomeRemoved = true;
      }
      
      userInput.value = '';
      userInput.style.height = 'auto';
      
      // แสดงข้อความฝั่งผู้ใช้ทันที
      addMessageAnimated(text, true);
      
      isSending = true;
      sendBtn.disabled = true;
      typingIndicator.classList.add('active');
      
      try {
        const response = await cyberAI.sendMessage(text);
        const aiText = extractAIResponse(response);
        
        typingIndicator.classList.remove('active');
        // เรียกใช้งานเอฟเฟกต์พ่นคำสำหรับ AI คำตอบ
        addMessageAnimated(aiText, false);
      } catch (error) {
        typingIndicator.classList.remove('active');
        addMessageAnimated(`⚠️ เกิดข้อผิดพลาดระบบ: ${error.message}`, false);
        isSending = false;
        sendBtn.disabled = false;
      }
    }
    
    function autoResizeTextarea() {
      userInput.style.height = 'auto';
      userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
    }
    
    sendBtn.addEventListener('click', function(e) {
      e.preventDefault();
      sendMessage();
    });
    
    userInput.addEventListener('keypress', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
    
    userInput.addEventListener('input', autoResizeTextarea);
    userInput.focus();
  </script>
</body>

</html>
